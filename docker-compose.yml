version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pos_system
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pos-network

  backend:
    build: ./backend
    container_name: pos-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://pos_user:pos_password@db:5432/pos_system
      JWT_SECRET: super-secret-jwt-key-2024
      PORT: 5000
      CLIENT_URL: http://localhost:5173
    networks:
      - pos-network

  frontend:
    build: ./frontend
    container_name: pos-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    networks:
      - pos-network

volumes:
  pgdata:

networks:
  pos-network:
    driver: bridge