services:
  db:
    image: postgres:16-alpine
    container_name: pos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env.db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pos-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.backend
    networks:
      - pos-network

  frontend:
    build: ./frontend
    container_name: pos-frontend
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    networks:
      - pos-network

volumes:
  pgdata:

networks:
  pos-network:
    driver: bridge